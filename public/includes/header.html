      <button id="btn-logout" class="btn-logout-header" style="display:none">Sortir</button>

<!-- Modal login / registre -->
<div id="modal-auth" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;">
  <div class="modal-auth-box">
    <button id="btn-tancar-auth" class="modal-close-btn">✕</button>

    <!-- Pestanyes -->
    <div class="auth-tabs">
      <button class="auth-tab activa" data-tab="login">Iniciar sessió</button>
      <button class="auth-tab" data-tab="registre">Registrar-se</button>
    </div>

    <!-- Login -->
    <form id="form-login" class="auth-form">
      <label>Usuari</label>
      <input id="login-username" type="text" placeholder="El teu usuari" autocomplete="username" required>
      <label>Contrasenya</label>
      <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" required>
      <p id="login-error" class="form-error"></p>
      <button type="submit" class="btn-primary">Iniciar sessió</button>
    </form>

    <!-- Registre -->
    <form id="form-registre" class="auth-form" style="display:none">
      <label>Usuari</label>
      <input id="reg-username" type="text" placeholder="Tria un nom d'usuari" required>
      <label>Contrasenya</label>
      <input id="reg-password" type="password" placeholder="Mínim 4 caràcters" required>
      <p id="reg-error" class="form-error"></p>
      <button type="submit" class="btn-primary">Crear compte</button>
    </form>
  </div>
</div>
