<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sol·licituds - EcoCity Connect</title>
    <link rel="stylesheet" href="./../style/style.css">
    <script src="./../js/components.js" defer></script>
    <script src="./../js/modeFosc.js" defer></script>
</head>
<body>
<main>
    <!-- No logejat -->
    <div id="vista-no-login" style="display:none; text-align:center; padding:4rem 1rem;">
        <p style="font-size:1.2rem;">Has d'iniciar sessió per veure les sol·licituds.</p>
        <p>Fes clic a <strong>Entrar</strong> a la barra superior.</p>
    </div>

    <!-- Logejat -->
    <div id="vista-principal" style="display:none;">
        <h2>Sol·licituds</h2>

        <!-- Pestanyes -->
        <nav class="tabs">
            <button class="tab-btn activa" data-tab="enviades">Enviades <span id="badge-enviades"></span></button>
            <button class="tab-btn" data-tab="rebudes">Rebudes <span id="badge-rebudes"></span></button>
        </nav>

        <!-- Panell enviades -->
        <div id="tab-enviades" class="tab-panell actiu">
            <p>Objectes que has sol·licitat a altres usuaris.</p>
            <p id="enviades-carregant">Carregant...</p>
            <div id="enviades-contenidor"></div>
        </div>

        <!-- Panell rebudes -->
        <div id="tab-rebudes" class="tab-panell">
            <p>Sol·licituds sobre els teus objectes publicats.</p>
            <p id="rebudes-carregant">Carregant...</p>
            <div id="rebudes-contenidor"></div>
        </div>
    </div>

</main>

<script>
// Pestanyes
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('activa'));
        document.querySelectorAll('.tab-panell').forEach(p => p.classList.remove('actiu'));
        btn.classList.add('activa');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('actiu');
    });
});

// Inicialitzar
async function inicialitzar() {
    const sessio = await fetch('/api/me').then(r => r.json());
    if (!sessio.loggedIn) {
        document.getElementById('vista-no-login').style.display = 'block';
        return;
    }
    document.getElementById('vista-principal').style.display = 'block';
    carregarEnviades();
    carregarRebudes();
}

// Sol·licituds ENVIADES
async function carregarEnviades() {
    const el = document.getElementById('enviades-carregant');
    el.style.display = 'block';
    try {
        const res = await fetch('/api/solicituds/enviades');
        const data = await res.json();
        el.style.display = 'none';
        document.getElementById('badge-enviades').textContent = data.length ? `(${data.length})` : '';
        renderitzarEnviades(data);
    } catch {
        el.textContent = 'Error carregant sol·licituds.';
    }
}

function renderitzarEnviades(llista) {
    const cont = document.getElementById('enviades-contenidor');
    cont.innerHTML = '';
    if (llista.length === 0) {
        cont.innerHTML = '<p class="buit">Encara no has sol·licitat cap objecte. Ves al <a href="catalegGeneral.html">catàleg</a> per explorar.</p>';
        return;
    }
    llista.forEach(s => {
        const div = document.createElement('div');
        div.className = 'sol-card';
        div.innerHTML = `
            <img src="${s.imatge || ''}" alt="${s.nom}"onerror="this.style.display='none'">
            <div class="sol-card-info">
                <h4>${s.nom}</h4>
                <div class="sol-card-meta">
                    <strong>Categoria:</strong> ${s.categoria} &nbsp;|&nbsp; <strong>CP:</strong> ${s.cp}<br>
                    <strong>Propietari:</strong> ${s.propietari || 'Sense propietari'} &nbsp;|&nbsp;
                    <strong>Objecte:</strong> <span class="estat estat-${s.object_estat}">${s.object_estat?.toUpperCase()}</span><br>
                    <strong>Sol·licitada:</strong> ${new Date(s.created_at).toLocaleDateString('ca-ES')}
                </div>
                ${s.missatge ? `<p class="sol-missatge">"${s.missatge}"</p>` : ''}
            </div>
            <div class="sol-accions">
                <span class="estat estat-badge-${s.estat}">${iconEstat(s.estat)} ${s.estat.toUpperCase()}
                </span>
                ${s.estat === 'pendent'
                    ? `<button class="btn-cancel" data-id="${s.id}">❌ Cancel·lar</button>`
                    : ''}
            </div>
        `;
        if (s.estat === 'pendent') {
            div.querySelector('.btn-cancel').addEventListener('click', () => cancellarSolicitud(s.id));
        }
        cont.appendChild(div);
    });
}

async function cancellarSolicitud(id) {
    if (!confirm('Cancel·lar aquesta sol·licitud?')) return;
    const res = await fetch(`/api/solicituds/${id}`, { method: 'DELETE' });
    if (!res.ok) { alert((await res.json()).error); return; }
    carregarEnviades();
}

// Sol·licituds REBUDES
async function carregarRebudes() {
    const el = document.getElementById('rebudes-carregant');
    el.style.display = 'block';
    try {
        const res = await fetch('/api/solicituds/rebudes');
        const data = await res.json();
        el.style.display = 'none';
        const pendents = data.filter(s => s.estat === 'pendent').length;
        document.getElementById('badge-rebudes').textContent = pendents ? `(${pendents} pendent${pendents > 1 ? 's' : ''})` : '';
        renderitzarRebudes(data);
    } catch {
        el.textContent = 'Error carregant sol·licituds.';
    }
}

function renderitzarRebudes(llista) {
    const cont = document.getElementById('rebudes-contenidor');
    cont.innerHTML = '';
    if (llista.length === 0) {
        cont.innerHTML = '<p class="buit">Cap sol·licitud rebuda de moment.</p>';
        return;
    }
    llista.forEach(s => {
        const div = document.createElement('div');
        div.className = 'sol-card';
        div.innerHTML = `
            <div class="sol-card-info">
                <h4>${s.nom} <small>— CP ${s.cp}</small></h4>
                <div class="sol-card-meta">
                    <strong>Sol·licitant:</strong> ${s.solicitant}<br>
                    <strong>Categoria:</strong> ${s.categoria}<br>
                    <strong>Data:</strong> ${new Date(s.created_at).toLocaleDateString('ca-ES')}
                </div>
                ${s.missatge ? `<p class="sol-missatge">"${s.missatge}"</p>` : ''}
            </div>
            <div class="sol-accions">
                <span class="estat estat-badge-${s.estat}">${iconEstat(s.estat)} ${s.estat.toUpperCase()}</span>
                ${s.estat === 'pendent' ? `
                    <button class="btn-primary btn-acceptar" data-id="${s.id}">✅ Acceptar</button>
                    <button class="btn-cancel btn-rebutjar" data-id="${s.id}">❌ Rebutjar</button>
                ` : ''}
            </div>
        `;
        if (s.estat === 'pendent') {
            div.querySelector('.btn-acceptar').addEventListener('click', () => canviarEstat(s.id, 'acceptada'));
            div.querySelector('.btn-rebutjar').addEventListener('click', () => canviarEstat(s.id, 'rebutjada'));
        }
        cont.appendChild(div);
    });
}

async function canviarEstat(id, estat) {
    const res = await fetch(`/api/solicituds/${id}/estat`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ estat })
    });
    if (!res.ok) { alert((await res.json()).error); return; }
    carregarRebudes();
}

function iconEstat(estat) {
    return { pendent: '⏳', acceptada: '✅', rebutjada: '❌' }[estat] || '';
}

document.addEventListener('DOMContentLoaded', inicialitzar);
</script>
</body>
</html>
