<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catàleg General - EcoCity Connect</title>
    <link rel="stylesheet" href="./../style/style.css">
    <script src="./../components.js" defer></script>
    <script src="./../modeFosc.js" defer></script>
</head>
<body>
<main>
    <h2>Catàleg d'objectes</h2>

    <section id="zona-filtres">
        <label for="filtre-categoria">Categoria:</label>
        <select id="filtre-categoria"><option value="">Totes</option></select>

        <label for="filtre-estat">Estat:</label>
        <select id="filtre-estat">
            <option value="">Tots</option>
            <option value="disponible">Disponible</option>
            <option value="prestat">Prestat</option>
        </select>

        <label for="filtre-cerca">Cercar:</label>
        <input type="text" id="filtre-cerca" placeholder="Nom o descripció...">
        <button id="btn-netejar-filtres">Netejar</button>
    </section>

    <p id="comptador-resultats"></p>
    <p id="missatge-carrega">Carregant objectes...</p>
    <div id="contenidor-objectes"></div>
</main>

<!-- Modal editar -->
<div id="modal-editar" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:8000;align-items:center;justify-content:center;">
    <div class="modal-auth-box">
        <h3>✏️ Editar objecte</h3>
        <form id="formulari-editar" style="display:flex;flex-direction:column;gap:.6rem;">
            <input type="hidden" id="edit-id">
            <label>Nom *</label><input type="text" id="edit-nom" required>
            <label>Descripció</label><textarea id="edit-descripcio" rows="2"></textarea>
            <label>Categoria *</label><input type="text" id="edit-categoria" required>
            <label>CP *</label><input type="text" id="edit-cp" maxlength="5" required>
            <label>Estat</label>
            <select id="edit-estat">
                <option value="disponible">Disponible</option>
                <option value="prestat">Prestat</option>
            </select>
            <label>URL Imatge</label><input type="text" id="edit-imatge" placeholder="https://...">
            <p id="edit-errors" class="form-error"></p>
            <div style="display:flex;gap:.5rem;">
                <button type="submit" class="btn-primary">Guardar</button>
                <button type="button" id="btn-cancel-editar">Cancel·lar</button>
            </div>
        </form>
    </div>
</div>

<script>
let totsElsObjectes = [];
let sessioUserId = null;

async function inicialitzar() {
    const sessio = await fetch('/api/me').then(r => r.json());
    sessioUserId = sessio.loggedIn ? sessio.id : null;
    await carregarObjectes();
}

async function carregarObjectes() {
    const msg = document.getElementById('missatge-carrega');
    msg.style.display = 'block';
    try {
        const res = await fetch('/api/objects');
        totsElsObjectes = await res.json();
        msg.style.display = 'none';
        omplirSelectCategories();
        renderitzarObjectes(totsElsObjectes);
    } catch (err) {
        msg.textContent = 'Error al carregar les dades.';
    }
}

function renderitzarObjectes(llista) {
    const cont = document.getElementById('contenidor-objectes');
    const comp = document.getElementById('comptador-resultats');
    cont.innerHTML = '';
    comp.textContent = `Mostrant ${llista.length} objecte${llista.length !== 1 ? 's' : ''}`;

    if (llista.length === 0) { cont.innerHTML = '<p>Cap objecte amb aquests filtres.</p>'; return; }

    llista.forEach(obj => {
        const esMeu = sessioUserId && obj.user_id === sessioUserId;
        const card  = document.createElement('article');
        card.className = 'card-objeto';
        card.innerHTML = `
            <img src="${obj.imatge || ''}" alt="${obj.nom}" onerror="this.style.display='none'">
            <div class="card-cos">
                <h3>${obj.nom}</h3>
                <p>${obj.descripcio || ''}</p>
                <p><strong>Categoria:</strong> ${obj.categoria} &nbsp;|&nbsp; <strong>CP:</strong> ${obj.cp}</p>
                <p class="estat estat-${obj.estat}">${obj.estat.toUpperCase()}</p>
                <div class="card-accions">
                    ${esMeu
                        ? `<button class="btn-editar"   data-id="${obj.id}">✏️ Editar</button>
                           <button class="btn-eliminar" data-id="${obj.id}">🗑️ Eliminar</button>`
                        : `<button class="btn-sol-licitar" data-id="${obj.id}" ${obj.estat !== 'disponible' ? 'disabled' : ''}>📩 Sol·licitar</button>`
                    }
                </div>
            </div>`;

        if (esMeu) {
            card.querySelector('.btn-editar').addEventListener('click',   () => obrirModal(obj.id));
            card.querySelector('.btn-eliminar').addEventListener('click', () => eliminar(obj.id, obj.nom));
        } else {
            card.querySelector('.btn-sol-licitar').addEventListener('click', () =>
                alert(`Sol·licitud enviada per "${obj.nom}"!\n(Funcionalitat en desenvolupament)`));
        }
        cont.appendChild(card);
    });
}

function omplirSelectCategories() {
    const sel = document.getElementById('filtre-categoria');
    [...new Set(totsElsObjectes.map(o => o.categoria))].sort().forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat; opt.textContent = cat;
        sel.appendChild(opt);
    });
}

function aplicarFiltres() {
    const cat   = document.getElementById('filtre-categoria').value;
    const estat = document.getElementById('filtre-estat').value;
    const cerca = document.getElementById('filtre-cerca').value.toLowerCase().trim();
    renderitzarObjectes(totsElsObjectes.filter(o =>
        (!cat   || o.categoria === cat) &&
        (!estat || o.estat === estat) &&
        (!cerca || o.nom.toLowerCase().includes(cerca) || (o.descripcio||'').toLowerCase().includes(cerca))
    ));
}

async function eliminar(id, nom) {
    if (!confirm(`Eliminar "${nom}"?`)) return;
    const res = await fetch(`/api/objects/${id}`, { method: 'DELETE' });
    if (!res.ok) { alert((await res.json()).error); return; }
    totsElsObjectes = totsElsObjectes.filter(o => o.id !== id);
    aplicarFiltres();
}

function obrirModal(id) {
    const obj = totsElsObjectes.find(o => o.id === id);
    if (!obj) return;
    document.getElementById('edit-id').value         = obj.id;
    document.getElementById('edit-nom').value        = obj.nom;
    document.getElementById('edit-descripcio').value = obj.descripcio || '';
    document.getElementById('edit-categoria').value  = obj.categoria;
    document.getElementById('edit-cp').value         = obj.cp;
    document.getElementById('edit-estat').value      = obj.estat;
    document.getElementById('edit-imatge').value     = obj.imatge || '';
    document.getElementById('edit-errors').textContent = '';
    document.getElementById('modal-editar').style.display = 'flex';
}

document.getElementById('btn-cancel-editar').addEventListener('click', () => {
    document.getElementById('modal-editar').style.display = 'none';
});

document.getElementById('formulari-editar').addEventListener('submit', async e => {
    e.preventDefault();
    const id   = parseInt(document.getElementById('edit-id').value);
    const body = {
        nom:        document.getElementById('edit-nom').value.trim(),
        descripcio: document.getElementById('edit-descripcio').value.trim(),
        categoria:  document.getElementById('edit-categoria').value.trim(),
        cp:         document.getElementById('edit-cp').value.trim(),
        estat:      document.getElementById('edit-estat').value,
        imatge:     document.getElementById('edit-imatge').value.trim()
    };
    const res  = await fetch(`/api/objects/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) { document.getElementById('edit-errors').textContent = data.error; return; }
    const idx = totsElsObjectes.findIndex(o => o.id === id);
    if (idx !== -1) totsElsObjectes[idx] = { ...totsElsObjectes[idx], ...data };
    document.getElementById('modal-editar').style.display = 'none';
    aplicarFiltres();
});

document.getElementById('filtre-categoria').addEventListener('change', aplicarFiltres);
document.getElementById('filtre-estat').addEventListener('change', aplicarFiltres);
document.getElementById('filtre-cerca').addEventListener('input', aplicarFiltres);
document.getElementById('btn-netejar-filtres').addEventListener('click', () => {
    document.getElementById('filtre-categoria').value = '';
    document.getElementById('filtre-estat').value = '';
    document.getElementById('filtre-cerca').value = '';
    renderitzarObjectes(totsElsObjectes);
});

document.addEventListener('DOMContentLoaded', inicialitzar);
</script>
</body>
</html>
