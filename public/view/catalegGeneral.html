<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catàleg General - EcoCity Connect</title>
    <link rel="stylesheet" href="./../style/style.css">
    <script src="./../js/components.js" defer></script>
    <script src="./../js/modeFosc.js" defer></script>
</head>
<body>
<main>
    <h2>Catàleg d'objectes</h2>

    <section id="zona-filtres">
        <label for="filtre-categoria">Categoria:</label>
        <select id="filtre-categoria"><option value="">Totes</option></select>

        <label for="filtre-estat">Estat:</label>
        <select id="filtre-estat">
            <option value="">Tots</option>
            <option value="disponible">Disponible</option>
            <option value="prestat">Prestat</option>
        </select>

        <label for="filtre-cp">Codi Postal:</label>
        <input type="text" id="filtre-cp" placeholder="Ex: 08001" maxlength="5">

        <label for="filtre-cerca">Cercar:</label>
        <input type="text" id="filtre-cerca" placeholder="Nom o descripció...">
        <button id="btn-netejar-filtres">Netejar</button>
    </section>

    <p id="comptador-resultats"></p>
    <p id="missatge-carrega">Carregant objectes...</p>
    <div id="contenidor-objectes"></div>
</main>

<!-- Modal editar -->
<div id="modal-editar" style="display:none;">
    <div class="modal-auth-box">
        <h3>Editar objecte</h3>
        <form id="formulari-editar">
            <input type="hidden" id="edit-id">
            <label>Nom *</label><input type="text" id="edit-nom" required>
            <label>Descripció</label><textarea id="edit-descripcio" rows="2"></textarea>
            <label>Categoria *</label>
            <select id="edit-categoria" required></select>
            <input type="text" id="edit-categoria-nova" placeholder="Nova categoria..." style="display:none; margin-top:.3rem;">
            <label>CP *</label><input type="text" id="edit-cp" maxlength="5" required>
            <label>Estat</label>
            <select id="edit-estat">
                <option value="disponible">Disponible</option>
                <option value="prestat">Prestat</option>
            </select>
            <label>URL Imatge</label><input type="text" id="edit-imatge" placeholder="https://...">
            <p id="edit-errors" class="form-error"></p>
            <div style="display:flex;gap:.5rem;">
                <button type="submit" class="btn-primary">Guardar</button>
                <button type="button" id="btn-cancel-editar">Cancel·lar</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal sol·licitar producte -->
<div id="modal-solicitar" style="display:none;">
    <div class="modal-auth-box">
        <button id="btn-tancar-solicitar" class="modal-close-btn">✕</button>
        <h3>Sol·licitar objecte</h3>
        <p id="solicitar-nom-objecte" ></p>
        <input type="hidden" id="solicitar-object-id">
        <div style="display:flex;flex-direction:column;gap:.6rem;">
            <label>Missatge (opcional)</label>
            <textarea id="solicitar-missatge" rows="3" placeholder="Explica per a quin ús el necessites, dates aproximades..."></textarea>
            <p id="solicitar-error" class="form-error"></p>
            <div style="display:flex;gap:.5rem;">
                <button id="btn-confirmar-solicitar" class="btn-primary">Enviar sol·licitud</button>
                <button id="btn-cancel-solicitar">Cancel·lar</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { carregarCategories, omplirSelectCategoriaEdit, obtenirCategoriaEdit, obrirModalEditar, tancarModalEditar } from './../js/objectes-editor.js';

let totsElsObjectes = [];
let sessioUserId = null;

async function inicialitzar() {
    const sessio = await fetch('/api/me').then(r => r.json());
    sessioUserId = sessio.loggedIn ? sessio.id : null;
    await carregarObjectes();
}

async function carregarObjectes() {
    const msg = document.getElementById('missatge-carrega');
    msg.style.display = 'block';
    try {
        const res = await fetch('/api/objects');
        totsElsObjectes = await res.json();
        msg.style.display = 'none';
        omplirSelectCategories();
        renderitzarObjectes(totsElsObjectes);
    } catch (err) {
        msg.textContent = 'Error al carregar les dades.';
    }
}

function renderitzarObjectes(llista) {
    const cont = document.getElementById('contenidor-objectes');
    const comp = document.getElementById('comptador-resultats');
    cont.innerHTML = '';
    comp.textContent = `Mostrant ${llista.length} objecte${llista.length !== 1 ? 's' : ''}`;

    if (llista.length === 0) { cont.innerHTML = '<p>Cap objecte amb aquests filtres.</p>'; return; }

    llista.forEach(obj => {
        const esMeu = sessioUserId && obj.user_id === sessioUserId;
        const card  = document.createElement('article');
        card.className = 'card-objeto';
        card.innerHTML = `
            <img src="${obj.imatge || ''}" alt="${obj.nom}" onerror="this.style.display='none'">
            <div class="card-cos">
                <h3>${obj.nom}</h3>
                <p>${obj.descripcio || ''}</p>
                <p><strong>Categoria:</strong> ${obj.categoria} &nbsp;|&nbsp; <strong>CP:</strong> ${obj.cp}</p>
                <p class="estat estat-${obj.estat}">${obj.estat.toUpperCase()}</p>
                <div class="card-accions">
                    <a href="detallsProducte.html?id=${obj.id}" class="btn-detalls">Veure detalls</a>
                    ${esMeu
                        ? `<button class="btn-editar" data-id="${obj.id}">Editar</button>
                           <button class="btn-eliminar" data-id="${obj.id}">Eliminar</button>`
                        : `<button class="btn-sol-licitar" data-id="${obj.id}" data-nom="${obj.nom}" ${obj.estat !== 'disponible' ? 'disabled' : ''}>Sol·licitar</button>`
                    }
                </div>
            </div>`;

        if (esMeu) {
            card.querySelector('.btn-editar').addEventListener('click', () => obrirModalEditar(obj, 'edit-errors'));
            card.querySelector('.btn-eliminar').addEventListener('click', () => eliminar(obj.id, obj.nom));
        } else {
            card.querySelector('.btn-sol-licitar').addEventListener('click', () => obrirModalSolicitar(obj.id, obj.nom));
        }
        cont.appendChild(card);
    });
}

// Filtres

function omplirSelectCategories() {
    const sel = document.getElementById('filtre-categoria');
    // Evitar duplicats si es recarrega
    [...sel.options].filter(o => o.value !== '').forEach(o => o.remove());
    [...new Set(totsElsObjectes.map(o => o.categoria))].sort().forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat; opt.textContent = cat;
        sel.appendChild(opt);
    });
}

function aplicarFiltres() {
    const cat = document.getElementById('filtre-categoria').value;
    const estat = document.getElementById('filtre-estat').value;
    const cp = document.getElementById('filtre-cp').value.trim();
    const cerca = document.getElementById('filtre-cerca').value.toLowerCase().trim();
    renderitzarObjectes(totsElsObjectes.filter(o =>
        (!cat || o.categoria === cat) &&
        (!estat || o.estat === estat) &&
        (!cp || o.cp === cp) &&
        (!cerca || o.nom.toLowerCase().includes(cerca) || (o.descripcio || '').toLowerCase().includes(cerca))
    ));
}

document.getElementById('filtre-categoria').addEventListener('change', aplicarFiltres);
document.getElementById('filtre-estat').addEventListener('change', aplicarFiltres);
document.getElementById('filtre-cp').addEventListener('input', aplicarFiltres);
document.getElementById('filtre-cerca').addEventListener('input', aplicarFiltres);
document.getElementById('btn-netejar-filtres').addEventListener('click', () => {
    document.getElementById('filtre-categoria').value = '';
    document.getElementById('filtre-estat').value = '';
    document.getElementById('filtre-cp').value = '';
    document.getElementById('filtre-cerca').value = '';
    renderitzarObjectes(totsElsObjectes);
});

// Eliminar 

async function eliminar(id, nom) {
    if (!confirm(`Eliminar "${nom}"?`)) return;
    const res = await fetch(`/api/objects/${id}`, { method: 'DELETE' });
    if (!res.ok) { alert((await res.json()).error); return; }
    totsElsObjectes = totsElsObjectes.filter(o => o.id !== id);
    aplicarFiltres();
}

// Modal editar 

document.getElementById('btn-cancel-editar').addEventListener('click', tancarModalEditar);

document.getElementById('formulari-editar').addEventListener('submit', async e => {
    e.preventDefault();
    const id   = parseInt(document.getElementById('edit-id').value);
    const body = {
        nom: document.getElementById('edit-nom').value.trim(),
        descripcio: document.getElementById('edit-descripcio').value.trim(),
        categoria: obtenirCategoriaEdit(),
        cp: document.getElementById('edit-cp').value.trim(),
        estat: document.getElementById('edit-estat').value,
        imatge: document.getElementById('edit-imatge').value.trim()
    };
    const res  = await fetch(`/api/objects/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) { document.getElementById('edit-errors').textContent = data.error; return; }
    const idx = totsElsObjectes.findIndex(o => o.id === id);
    if (idx !== -1) totsElsObjectes[idx] = { ...totsElsObjectes[idx], ...data };
    tancarModalEditar();
    aplicarFiltres();
});

// Modal sol·licitar 

function obrirModalSolicitar(objectId, nomObjecte) {
    if (!sessioUserId) {
        const btnAuth = document.getElementById('btn-obrir-auth');
        if (btnAuth) btnAuth.click();
        return;
    }
    document.getElementById('solicitar-object-id').value = objectId;
    document.getElementById('solicitar-nom-objecte').textContent = nomObjecte;
    document.getElementById('solicitar-missatge').value = '';
    document.getElementById('solicitar-error').textContent = '';
    document.getElementById('modal-solicitar').style.display = 'flex';
}

function tancarModalSolicitar() {
    document.getElementById('modal-solicitar').style.display = 'none';
}

document.getElementById('btn-tancar-solicitar').addEventListener('click', tancarModalSolicitar);
document.getElementById('btn-cancel-solicitar').addEventListener('click', tancarModalSolicitar);
document.getElementById('modal-solicitar').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-solicitar')) tancarModalSolicitar();
});

document.getElementById('btn-confirmar-solicitar').addEventListener('click', async () => {
    const objectId = parseInt(document.getElementById('solicitar-object-id').value);
    const missatge = document.getElementById('solicitar-missatge').value.trim();
    const errorEl = document.getElementById('solicitar-error');
    errorEl.textContent = '';

    const res  = await fetch('/api/solicituds', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ object_id: objectId, missatge })
    });
    const data = await res.json();
    if (!res.ok) { errorEl.textContent = data.error; return; }

    tancarModalSolicitar();
    const anar = confirm('Sol·licitud enviada correctament!\n\nVols veure les teves sol·licituds?');
    if (anar) window.location.href = '/view/solicituds.html';
});


document.addEventListener('DOMContentLoaded', async () => {
    await carregarCategories();
    inicialitzar();
});
</script>
</body>
</html>
