<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panell Usuari - EcoCity Connect</title>
    <link rel="stylesheet" href="./../style/style.css">
    <script src="./../components.js" defer></script>
    <script src="./../modeFosc.js" defer></script>
</head>
<body>
<main>
    <!-- Estat: no logejat -->
    <div id="vista-no-login" style="display:none; text-align:center; padding:3rem 1rem;">
        <p style="font-size:1.2rem;">Has d'iniciar sessió per veure el teu panell.</p>
        <p>Fes clic a <strong>🔑 Entrar</strong> a la barra superior.</p>
    </div>

    <!-- Estat: logejat -->
    <div id="vista-panell" style="display:none;">
        <h2>👤 Hola, <span id="panell-username"></span>!</h2>

        <div style="display:flex; gap:.75rem; flex-wrap:wrap; margin-bottom:2rem;">
            <a href="createObject.html" class="btn-primary" style="text-decoration:none; display:inline-block;">➕ Publicar objecte nou</a>
            <a href="solicituds.html"   style="background:#457b9d; color:#fff; border:none; border-radius:6px; padding:.6rem 1rem; cursor:pointer; font-size:1rem; font-weight:600; text-decoration:none; display:inline-block;">📩 Veure les meves sol·licituds</a>
        </div>

        <!-- Sol·licituds rebudes (sobre els meus objectes) -->
        <section class="panell-seccio">
            <h3>📬 Sol·licituds rebudes</h3>
            <p style="color:#6c757d; font-size:.9rem; margin-bottom:.75rem;">Altres usuaris han sol·licitat els teus objectes.</p>
            <p id="rebudes-carregant">Carregant...</p>
            <div id="rebudes-contenidor"></div>
        </section>

        <hr>

        <!-- Els meus objectes -->
        <section class="panell-seccio">
            <h3>📦 Els meus objectes</h3>
            <p id="meus-carregant">Carregant...</p>
            <div id="meus-contenidor"></div>
        </section>
    </div>

    <!-- Modal editar -->
    <div id="modal-editar" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:8000;align-items:center;justify-content:center;">
        <div class="modal-auth-box">
            <h3>✏️ Editar objecte</h3>
            <form id="form-editar" style="display:flex;flex-direction:column;gap:.6rem;">
                <input type="hidden" id="edit-id">
                <label>Nom *</label>
                <input type="text" id="edit-nom" required>
                <label>Descripció</label>
                <textarea id="edit-descripcio" rows="2"></textarea>
                <label>Categoria *</label>
                <select id="edit-categoria" required></select>
                <input type="text" id="edit-categoria-nova" placeholder="Nova categoria..." style="display:none; margin-top:.3rem;">
                <label>CP *</label>
                <input type="text" id="edit-cp" maxlength="5" required>
                <label>Estat</label>
                <select id="edit-estat">
                    <option value="disponible">Disponible</option>
                    <option value="prestat">Prestat</option>
                </select>
                <label>URL Imatge</label>
                <input type="text" id="edit-imatge" placeholder="https://...">
                <p id="edit-error" class="form-error"></p>
                <div style="display:flex;gap:.5rem;">
                    <button type="submit" class="btn-primary">Guardar</button>
                    <button type="button" id="btn-cancel-edit">Cancel·lar</button>
                </div>
            </form>
        </div>
    </div>

</main>

<script>
let meusObjectes = [];

async function inicialitzar() {
    const sessio = await fetch('/api/me').then(r => r.json());

    if (!sessio.loggedIn) {
        document.getElementById('vista-no-login').style.display = 'block';
        return;
    }

    document.getElementById('vista-panell').style.display = 'block';
    document.getElementById('panell-username').textContent = sessio.username;
    carregarObjectes();
    carregarSolicitudsRebudes();
}

// ── Els meus objectes ──────────────────────────────────────────
async function carregarObjectes() {
    const el = document.getElementById('meus-carregant');
    el.style.display = 'block';
    el.textContent   = 'Carregant...';
    try {
        const res = await fetch('/api/objects/meus');
        if (!res.ok) throw new Error((await res.json()).error);
        meusObjectes = await res.json();
        el.style.display = 'none';
        renderitzarObjectes();
    } catch (err) {
        el.textContent = 'Error: ' + err.message;
    }
}

function renderitzarObjectes() {
    const cont = document.getElementById('meus-contenidor');
    cont.innerHTML = '';
    if (meusObjectes.length === 0) {
        cont.innerHTML = '<p>Encara no tens cap objecte publicat. <a href="createObject.html">Publica\'n un ara</a>.</p>';
        return;
    }
    meusObjectes.forEach(obj => {
        const card = document.createElement('article');
        card.className = 'card-objeto';
        card.innerHTML = `
            <img src="${obj.imatge || ''}" alt="${obj.nom}" onerror="this.style.display='none'">
            <div class="card-cos">
                <h3>${obj.nom}</h3>
                <p>${obj.descripcio || ''}</p>
                <p><strong>Categoria:</strong> ${obj.categoria} &nbsp;|&nbsp; <strong>CP:</strong> ${obj.cp}</p>
                <p class="estat estat-${obj.estat}">${obj.estat.toUpperCase()}</p>
                <div class="card-accions">
                    <button class="btn-editar"   data-id="${obj.id}">✏️ Editar</button>
                    <button class="btn-eliminar" data-id="${obj.id}">🗑️ Eliminar</button>
                </div>
            </div>`;
        card.querySelector('.btn-editar').addEventListener('click',   () => obrirEditar(obj.id));
        card.querySelector('.btn-eliminar').addEventListener('click', () => eliminar(obj.id, obj.nom));
        cont.appendChild(card);
    });
}

// ── Sol·licituds rebudes ───────────────────────────────────────
async function carregarSolicitudsRebudes() {
    const el = document.getElementById('rebudes-carregant');
    el.style.display = 'block';
    try {
        const res  = await fetch('/api/solicituds/rebudes');
        const data = await res.json();
        el.style.display = 'none';
        renderitzarRebudes(data);
    } catch {
        el.textContent = 'Error carregant sol·licituds.';
    }
}

function renderitzarRebudes(llista) {
    const cont = document.getElementById('rebudes-contenidor');
    cont.innerHTML = '';
    if (llista.length === 0) {
        cont.innerHTML = '<p style="color:#6c757d;">Cap sol·licitud rebuda de moment.</p>';
        return;
    }
    llista.forEach(s => {
        const colors = { pendent: '#fff3cd', acceptada: '#d8f3dc', rebutjada: '#fde2e4' };
        const div = document.createElement('div');
        div.style.cssText = `background:${colors[s.estat] || '#f8f9fa'}; border-radius:8px; padding:.85rem 1rem; margin-bottom:.6rem; display:flex; flex-wrap:wrap; align-items:center; gap:.5rem;`;
        div.innerHTML = `
            <span style="flex:1; min-width:160px;">
                <strong>${s.nom}</strong>
                <small style="display:block; color:#6c757d; margin-top:.1rem;">
                    Per <strong>${s.solicitant}</strong> · ${new Date(s.created_at).toLocaleDateString('ca-ES')}
                </small>
                ${s.missatge ? `<small style="display:block; color:#495057; margin-top:.2rem; font-style:italic;">"${s.missatge}"</small>` : ''}
            </span>
            <span class="estat estat-${s.estat}" style="white-space:nowrap;">${s.estat.toUpperCase()}</span>
            ${s.estat === 'pendent' ? `
                <button class="btn-acceptar btn-primary" data-id="${s.id}" style="padding:.35rem .7rem; font-size:.82rem;">✅ Acceptar</button>
                <button class="btn-rebutjar" data-id="${s.id}" style="background:#ffe0e0; color:#c1121f; border:none; border-radius:6px; padding:.35rem .7rem; cursor:pointer; font-size:.82rem;">❌ Rebutjar</button>
            ` : ''}
        `;
        if (s.estat === 'pendent') {
            div.querySelector('.btn-acceptar').addEventListener('click', () => canviarEstat(s.id, 'acceptada'));
            div.querySelector('.btn-rebutjar').addEventListener('click', () => canviarEstat(s.id, 'rebutjada'));
        }
        cont.appendChild(div);
    });
}

async function canviarEstat(id, estat) {
    const res = await fetch(`/api/solicituds/${id}/estat`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ estat })
    });
    if (!res.ok) { alert((await res.json()).error); return; }
    carregarSolicitudsRebudes();
}

// Editar objecte
function obrirEditar(id) {
    const obj = meusObjectes.find(o => o.id === id);
    if (!obj) return;
    document.getElementById('edit-id').value          = obj.id;
    document.getElementById('edit-nom').value         = obj.nom;
    document.getElementById('edit-descripcio').value  = obj.descripcio || '';
    omplirSelectCategoriaEdit(obj.categoria);
    document.getElementById('edit-cp').value          = obj.cp;
    document.getElementById('edit-estat').value       = obj.estat;
    document.getElementById('edit-imatge').value      = obj.imatge || '';
    document.getElementById('edit-error').textContent = '';
    document.getElementById('modal-editar').style.display = 'flex';
}

document.getElementById('btn-cancel-edit').addEventListener('click', () => {
    document.getElementById('modal-editar').style.display = 'none';
});

document.getElementById('form-editar').addEventListener('submit', async e => {
    e.preventDefault();
    const id      = parseInt(document.getElementById('edit-id').value);
    const errorEl = document.getElementById('edit-error');
    const body    = {
        nom:        document.getElementById('edit-nom').value.trim(),
        descripcio: document.getElementById('edit-descripcio').value.trim(),
        categoria:  obtenirCategoriaEdit(),
        cp:         document.getElementById('edit-cp').value.trim(),
        estat:      document.getElementById('edit-estat').value,
        imatge:     document.getElementById('edit-imatge').value.trim()
    };
    const res  = await fetch(`/api/objects/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) { errorEl.textContent = data.error; return; }
    document.getElementById('modal-editar').style.display = 'none';
    await carregarObjectes();
});

// Eliminar objecte
async function eliminar(id, nom) {
    if (!confirm(`Eliminar "${nom}"?`)) return;
    const res = await fetch(`/api/objects/${id}`, { method:'DELETE' });
    if (!res.ok) { alert((await res.json()).error); return; }
    await carregarObjectes();
}

// ── Categories dinàmiques (modal editar) ─────────────────────
let categoriesCache = [];

async function carregarCategories() {
    try {
        categoriesCache = await fetch('/api/categories').then(r => r.json());
    } catch { categoriesCache = []; }
}

function omplirSelectCategoriaEdit(valorActual) {
    const sel  = document.getElementById('edit-categoria');
    const nova = document.getElementById('edit-categoria-nova');
    sel.innerHTML = '';
    categoriesCache.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat; opt.textContent = cat;
        sel.appendChild(opt);
    });
    const optAltra = document.createElement('option');
    optAltra.value = '__altra__'; optAltra.textContent = '+ Altra categoria...';
    sel.appendChild(optAltra);

    if (valorActual && !categoriesCache.includes(valorActual)) {
        const optExtra = document.createElement('option');
        optExtra.value = valorActual; optExtra.textContent = valorActual;
        sel.insertBefore(optExtra, optAltra);
        sel.value = valorActual;
    } else {
        sel.value = valorActual || (categoriesCache[0] || '');
    }
    nova.style.display = 'none';
    nova.value = '';
}

function obtenirCategoriaEdit() {
    const sel = document.getElementById('edit-categoria');
    if (sel.value === '__altra__') {
        return document.getElementById('edit-categoria-nova').value.trim();
    }
    return sel.value.trim();
}

document.getElementById('edit-categoria').addEventListener('change', () => {
    const nova = document.getElementById('edit-categoria-nova');
    const isAltra = document.getElementById('edit-categoria').value === '__altra__';
    nova.style.display = isAltra ? 'block' : 'none';
    if (isAltra) nova.focus();
});

document.addEventListener('DOMContentLoaded', async () => {
    await carregarCategories();
    inicialitzar();
});
</script>
</body>
</html>
